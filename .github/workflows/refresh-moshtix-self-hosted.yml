name: Refresh Moshtix Self-Hosted

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: refresh-moshtix-self-hosted
  cancel-in-progress: false

jobs:
  scrape-moshtix:
    runs-on:
      - self-hosted
      - perth-gig-finder
      - ticketmaster
    timeout-minutes: 45
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          package-manager-cache: false

      - name: Set up pnpm with Corepack
        run: |
          npm install --global corepack@latest
          corepack enable pnpm
          pnpm --version

      - name: Configure pnpm cache
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Scrape Moshtix WA
        env:
          SCRAPER_SOURCE_SLUGS: moshtix-wa
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: pnpm --filter @perth-gig-finder/scraper scrape

      - name: Backfill mirrored images (best effort)
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: pnpm mirror-images
