version = 1
name = "Perth Gig Finder"

[setup]
script = "CI=true ./scripts/with-supported-node.sh pnpm install --frozen-lockfile"

[[actions]]
name = "Bootstrap Local"
icon = "run"
command = "./scripts/with-supported-node.sh pnpm local:bootstrap"

[[actions]]
name = "Refresh Gigs"
icon = "run"
command = "./scripts/with-supported-node.sh pnpm scrape"

[[actions]]
name = "Run Dev Server"
icon = "run"
command = "./scripts/with-supported-node.sh pnpm web:dev"

[[actions]]
name = "Run Preview Server"
icon = "run"
command = "./scripts/with-supported-node.sh pnpm web:preview"

[[actions]]
name = "Run Tests"
icon = "test"
command = "./scripts/with-supported-node.sh pnpm test"

[[actions]]
name = "Build App"
icon = "run"
command = "./scripts/with-supported-node.sh pnpm build"

[[actions]]
name = "Repair Local"
icon = "run"
command = "./scripts/with-supported-node.sh pnpm local:repair"
