version = 1
name = "Perth Gig Finder"

[setup]
script = "./scripts/with-supported-node.sh pnpm install"

[[actions]]
name = "Bootstrap Local"
icon = "run"
command = "./scripts/with-supported-node.sh pnpm local:bootstrap"

[[actions]]
name = "Start Supabase"
icon = "run"
command = "./scripts/with-supported-node.sh pnpm supabase:start"

[[actions]]
name = "Print Local Keys"
icon = "run"
command = "./scripts/with-supported-node.sh pnpm supabase:keys"

[[actions]]
name = "Reset Database"
icon = "run"
command = "./scripts/with-supported-node.sh pnpm supabase:reset"

[[actions]]
name = "Refresh Gigs"
icon = "run"
command = "./scripts/with-supported-node.sh pnpm scrape"

[[actions]]
name = "Run Web"
icon = "run"
command = "./scripts/with-supported-node.sh pnpm local:web:dev"

[[actions]]
name = "Run Web Preview"
icon = "run"
command = "./scripts/with-supported-node.sh pnpm local:web:preview"

[[actions]]
name = "Run Phone Proxy"
icon = "run"
command = "./scripts/with-supported-node.sh pnpm local:web:phone-proxy"

[[actions]]
name = "Run Tests"
icon = "test"
command = "./scripts/with-supported-node.sh pnpm test"

[[actions]]
name = "Build App"
icon = "run"
command = "./scripts/with-supported-node.sh pnpm build"
